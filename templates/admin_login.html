<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/static/icons/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="/static/icons/site.webmanifest">
  <meta name="theme-color" content="#0d0b16">
  <title>Admin Login | Dedsite</title>
  <link rel="stylesheet" href="/static/css/site.css?v=admin-1">
</head>
<body>
  <div class="terminal admin-terminal">
    <div class="terminal-bar" aria-label="Terminal window controls">
      <div class="terminal-controls">
        <a class="terminal-control is-close" href="/" aria-label="Return home">
          <span aria-hidden="true"></span>
        </a>
        <span class="terminal-control is-minimize" aria-hidden="true"><span></span></span>
        <span class="terminal-control is-maximize" aria-hidden="true"><span></span></span>
      </div>
    </div>

    <main class="admin-shell">
      <section class="admin-form">
        <p class="detail-prompt">~/home $ sudo login</p>
        <h1>admin login</h1>
        {{ if .Error }}<p class="form-error">{{ .Error }}</p>{{ end }}

        {{ if .GoogleOAuthEnabled }}
          <a class="contact" href="/admin/login/google">Sign in with Google</a>
        {{ else }}
          <p class="description">Set Google OAuth environment variables to enable admin login.</p>
        {{ end }}
      </section>
    </main>
  </div>
</body>
</html>
