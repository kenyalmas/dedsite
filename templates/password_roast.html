<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/static/icons/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="/static/icons/site.webmanifest">
  <meta name="theme-color" content="#0d0b16">
  <title>password_roast.js</title>
  <link rel="stylesheet" href="/static/css/site.css?v=password-roast-1">
  <script src="/static/js/terminal-buttons.js?v=3" defer></script>
  <script src="/static/js/password-roast.js?v=1" defer></script>
</head>
<body>
  <div class="terminal">
    <div class="terminal-bar" aria-label="Terminal window controls">
      <div class="terminal-controls">
        <button class="terminal-control is-close" type="button" aria-label="Return home" data-terminal-action="close" data-terminal-href="/">
          <span aria-hidden="true"></span>
        </button>
        <button class="terminal-control is-minimize" type="button" aria-label="Minimize terminal" data-terminal-action="minimize">
          <span aria-hidden="true"></span>
        </button>
        <button class="terminal-control is-maximize" type="button" aria-label="Toggle focus mode" data-terminal-action="maximize">
          <span aria-hidden="true"></span>
        </button>
      </div>
      <nav class="workspace-tabs" aria-label="Site workspaces">
        <a class="workspace-tab" href="/"><span class="workspace-tab-label">resume.md</span></a>
        <a class="workspace-tab" href="/awareness"><span class="workspace-tab-label">awareness.html</span></a>
        <button class="workspace-tab is-active" type="button" aria-selected="true"><span class="workspace-tab-label">password_roast.js</span></button>
      </nav>
    </div>

    <main class="shell detail-shell roast-shell">
      <section class="portfolio roast-panel" aria-label="Password Roast Studio">
        <p class="detail-prompt">~/password-roast $ roast --local-only</p>
        <article class="detail-card roast-card">
          <header class="detail-header">
            <div>
              <h2>Password Roast Studio</h2>
            </div>
          </header>

          <div class="roast-grid">
            <section class="detail-block roast-console" aria-label="Password test console">
              <label class="roast-label" for="password-input">Sample password</label>
              <div class="roast-input-row">
                <input id="password-input" type="text" autocomplete="off" spellcheck="false" inputmode="text" placeholder="try: Password123!">
              </div>

              <div class="roast-meter" aria-label="Password strength">
                <div id="strength-bar" class="roast-meter-fill"></div>
              </div>
              <p id="score-line" class="roast-score">awaiting questionable decisions...</p>

              <div class="detail-actions roast-actions">
                <button id="generate-password" class="contact" type="button">Generate password</button>
                <button id="clear-password" class="contact roast-button-secondary" type="button">Clear</button>
                <a class="contact roast-button-secondary" href="/">Back to main site</a>
              </div>
            </section>

            <section class="detail-block roast-output" aria-live="polite" aria-label="Roast and advice">
              <p id="roast-copy">The studio keeps the judgment local.</p>
              <ul id="feedback-list" class="roast-feedback" hidden></ul>
            </section>
          </div>
        </article>
      </section>
    </main>
  </div>

</body>
</html>
